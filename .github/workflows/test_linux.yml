name: Linux Integration Test

# Triggers:
#   1. Manual: Actions tab -> "Run workflow" button (pick mode + scopes)
#   2. PR label: add "test:integration" label to a PR (runs with --shell only)
#   3. Push to PR: runs on push if the PR already has the "test:integration" label
# Use manual dispatch for full scope coverage; label triggers are fast smoke tests.

on:
  workflow_dispatch:
    inputs:
      scopes:
        description: "Scope flags for setup.sh (space-separated)"
        type: string
        default: "--shell --python --pwsh --k8s-dev --terraform --omp-theme base"

  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event.label.name || 'push' }}
  cancel-in-progress: true

jobs:
  test-linux:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'test:integration') ||
      (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'test:integration'))

    # Matrix covers the two Nix install modes that map to real deployment targets:
    #   - daemon    : multi-user install. Scenario: WSL, bare-metal Linux,
    #                 managed macOS via equivalent path.
    #   - no-daemon : single-user rootless install. Scenario: Coder /
    #                 devcontainer (no systemd, no root at runtime).
    #                 Passing this job is the Coder compatibility guarantee.
    # See ARCHITECTURE.md "CI pipelines and validated targets" for the full map.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: daemon     # WSL / bare-metal Linux / managed macOS scenario
            nix-method: determinate
            default-scopes: "--shell --pwsh --k8s-base --conda --omp-theme base"
          - name: no-daemon  # Coder / rootless container scenario
            nix-method: no-daemon
            default-scopes: "--shell --pwsh --k8s-base --conda --starship-theme base"
          - name: tarball   # tarball install (no .git)
            nix-method: determinate
            default-scopes: "--shell --pwsh --k8s-base --conda --omp-theme base"
            tarball: true

    name: "nix/setup.sh (${{ matrix.name }})"
    runs-on: ubuntu-slim
    timeout-minutes: 30
    env:
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

    steps:
      # ---- critical steps (fail-fast) ----------------------------------------
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix (Determinate)
        if: matrix.nix-method == 'determinate'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Install Nix (no-daemon)
        if: matrix.nix-method == 'no-daemon'
        run: |
          curl -sL https://nixos.org/nix/install | sh -s -- --no-daemon
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          mkdir -p "$HOME/.config/nix"
          printf 'experimental-features = nix-command flakes\n' > "$HOME/.config/nix/nix.conf"

      - name: Verify nix is working
        run: |
          nix --version
          nix store info

      - name: Build and extract tarball
        if: matrix.tarball
        id: tarball
        run: |
          VERSION=0.0.0-ci .assets/tools/build_release.sh
          TARBALL_DIR="$(mktemp -d)"
          tar -xzf dist/envy-nx-0.0.0-ci.tar.gz -C "$TARBALL_DIR"
          echo "dir=$TARBALL_DIR/envy-nx-0.0.0-ci" >> "$GITHUB_OUTPUT"

      - name: Run setup.sh
        run: |
          SETUP_DIR="${{ steps.tarball.outputs.dir || '.' }}"
          "$SETUP_DIR/nix/setup.sh" \
            ${{ github.event.inputs.scopes || matrix.default-scopes }} \
            --unattended --quiet-summary

      # ---- verification steps (continue-on-error, summary at end) ------------
      - name: Verify core binaries on PATH
        id: core-bins
        continue-on-error: true
        run: |
          echo "--- Verifying binaries ---"
          failed=0
          for cmd in git gh jq curl openssl; do
            if command -v "$cmd" &>/dev/null; then
              printf "\e[32m%-20s %s\e[0m\n" "$cmd" "$(command -v "$cmd")"
            else
              printf "\e[31m%-20s MISSING\e[0m\n" "$cmd"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Verify scope binaries on PATH
        id: scope-bins
        continue-on-error: true
        run: |
          echo "--- Verifying scope binaries ---"
          failed=0
          scopes="${{ github.event.inputs.scopes || matrix.default-scopes }}"
          bins=""
          [[ "$scopes" == *"--shell"* ]] && bins="$bins fzf eza bat rg yq"
          [[ "$scopes" == *"--python"* ]] && bins="$bins uv"
          [[ "$scopes" == *"--pwsh"* ]] && bins="$bins pwsh"
          [[ "$scopes" == *"--nodejs"* ]] && bins="$bins node"
          [[ "$scopes" == *"--k8s-base"* ]] && bins="$bins kubectl k9s"
          [[ "$scopes" == *"--k8s-dev"* ]] && bins="$bins helm kustomize trivy"
          [[ "$scopes" == *"--terraform"* ]] && bins="$bins terraform"
          [[ "$scopes" == *"--bun"* ]] && bins="$bins bun"
          for cmd in $bins; do
            if command -v "$cmd" &>/dev/null; then
              printf "\e[32m%-20s %s\e[0m\n" "$cmd" "$(command -v "$cmd")"
            else
              printf "\e[31m%-20s MISSING\e[0m\n" "$cmd"
              failed=1
            fi
          done
          # conda's binary lives under ~/miniforge3/ rather than nix-profile
          # because miniforge isn't a nix package - configure/conda.sh runs
          # the official installer. Verify the install dir + the binary.
          if [[ "$scopes" == *"--conda"* ]]; then
            if [[ -x "$HOME/miniforge3/bin/conda" ]]; then
              printf "\e[32m%-20s %s\e[0m\n" "conda" "$HOME/miniforge3/bin/conda"
            else
              printf "\e[31m%-20s MISSING (expected at ~/miniforge3/bin/conda)\e[0m\n" "conda"
              failed=1
            fi
          fi
          [ "$failed" -eq 0 ] || exit 1

      - name: Run nx doctor
        id: nx-doctor
        continue-on-error: true
        run: bash "$HOME/.config/nix-env/nx_doctor.sh" --strict

      - name: Verify managed block in shell profile
        id: managed-block
        continue-on-error: true
        run: |
          echo "--- Checking managed block in ~/.bashrc ---"
          if grep -qF '# >>> nix:managed >>>' ~/.bashrc; then
            echo "nix:managed block present"
          else
            echo "ERROR: nix:managed block not found in ~/.bashrc"
            exit 1
          fi

      - name: Verify install provenance record
        id: provenance
        continue-on-error: true
        run: |
          echo "--- Checking install.json ---"
          test -f "$HOME/.config/dev-env/install.json"
          jq -e '.status == "success"' "$HOME/.config/dev-env/install.json"
          echo "install.json check passed"

      - name: Verify tarball provenance
        if: matrix.tarball
        id: tarball-provenance
        continue-on-error: true
        run: |
          echo "--- Checking tarball-specific provenance ---"
          jq -e '.source == "tarball"' "$HOME/.config/dev-env/install.json"
          jq -e '.version == "0.0.0-ci"' "$HOME/.config/dev-env/install.json"
          echo "tarball provenance check passed"

      - name: Verify idempotency (second run)
        id: idempotency
        continue-on-error: true
        run: |
          echo "--- Running setup.sh a second time (idempotency check) ---"
          nix/setup.sh --unattended --quiet-summary
          count=$(grep -cF '# >>> nix:managed >>>' ~/.bashrc)
          if [ "$count" -ne 1 ]; then
            echo "ERROR: expected 1 nix:managed block, found $count"
            exit 1
          fi
          echo "idempotency check passed"

      - name: Run full bats suite
        id: bats
        continue-on-error: true
        # Parallelize across files via xargs -P 4 (mirrors `make test-unit`).
        # Now that bats is parallel + ~30s for the full suite, running every
        # file in integration is basically free and catches drift the
        # changed-file-scoped Preflight Checks workflow would miss.
        run: |
          echo "--- Running full bats suite (parallel) ---"
          printf '%s\0' tests/bats/*.bats | xargs -0 -P 4 -n 1 bats

      - name: Install Pester module
        id: pester-install
        continue-on-error: true
        # `--pwsh` scope installs the runtime but not Pester itself. The
        # version is pinned to match repo_checks.yml + CONTRIBUTING.
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 5.6.0 -Repository PSGallery -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run full Pester suite
        id: pester
        continue-on-error: true
        # Pester runs via the same helper used by `make test-unit` -
        # ForEach-Object -Parallel inside one pwsh session with
        # ConcurrentBag for thread-safe result aggregation. ~11s on a
        # warm pwsh. Requires --pwsh in the install scope (default
        # Linux scopes include it) and the Pester module installed
        # by the previous step.
        run: |
          echo "--- Running full Pester suite (parallel) ---"
          if ! command -v pwsh >/dev/null 2>&1; then
            echo "pwsh not on PATH - install with --pwsh scope to enable Pester in CI"
            exit 1
          fi
          pwsh -nop -File tests/hooks/pester_parallel.ps1

      - name: Verify uninstaller (env-only)
        id: uninstaller
        continue-on-error: true
        run: |
          echo "--- Running nix/uninstall.sh --env-only ---"
          nix/uninstall.sh --env-only

          echo "--- Checking nix:managed block removed (and legacy too) ---"
          if grep -qF '# >>> nix:managed >>>' ~/.bashrc; then
            echo "ERROR: nix:managed block still present"
            exit 1
          fi
          if grep -qF '# >>> nix-env managed >>>' ~/.bashrc; then
            echo "ERROR: legacy nix-env managed block still present"
            exit 1
          fi

          echo "--- Checking env:managed block preserved ---"
          if ! grep -qF '# >>> env:managed >>>' ~/.bashrc; then
            echo "ERROR: env:managed block missing"
            exit 1
          fi

          echo "--- Checking nix-env config removed ---"
          if [ -d "$HOME/.config/nix-env" ]; then
            echo "ERROR: ~/.config/nix-env still exists"
            exit 1
          fi

          echo "--- Checking nix-specific aliases removed ---"
          if [ -f "$HOME/.config/shell/aliases_nix.sh" ]; then
            echo "ERROR: aliases_nix.sh still exists"
            exit 1
          fi

          echo "--- Checking generic config preserved ---"
          test -f "$HOME/.config/shell/functions.sh"

          echo "--- Checking Nix still installed ---"
          test -d /nix/store

          # The uninstaller's phase 1g removes ~/miniforge3/ and the conda
          # init block from the rc. Verify both - this is the only
          # integration-time check that conda cleanup actually fires.
          if [[ "${{ github.event.inputs.scopes || matrix.default-scopes }}" == *"--conda"* ]]; then
            echo "--- Checking conda cleanup (miniforge3 + conda init block) ---"
            if [ -d "$HOME/miniforge3" ]; then
              echo "ERROR: ~/miniforge3 still exists after uninstall"
              exit 1
            fi
            if grep -qF '# >>> conda initialize >>>' ~/.bashrc; then
              echo "ERROR: conda initialize block still in ~/.bashrc"
              exit 1
            fi
            echo "conda cleanup verified"
          fi
          echo "uninstall checks passed"

      # ---- summary -----------------------------------------------------------
      - name: Show verification summary
        if: always()
        run: |
          set -euo pipefail

          gh_to_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          echo ""
          echo "Verification results:"
          any_failed=false

          while IFS= read -r entry; do
            entry="${entry#"${entry%%[![:space:]]*}"}"
            [ -z "$entry" ] && continue
            id="${entry%%:*}"
            label="${entry#*:}"
            outcome=""
            case "$id" in
              core-bins)     outcome="${{ steps.core-bins.outcome }}" ;;
              scope-bins)    outcome="${{ steps.scope-bins.outcome }}" ;;
              nx-doctor)     outcome="${{ steps.nx-doctor.outcome }}" ;;
              managed-block) outcome="${{ steps.managed-block.outcome }}" ;;
              idempotency)   outcome="${{ steps.idempotency.outcome }}" ;;
              provenance)    outcome="${{ steps.provenance.outcome }}" ;;
              tarball-prov)  outcome="${{ steps.tarball-provenance.outcome }}" ;;
              bats)          outcome="${{ steps.bats.outcome }}" ;;
              pester)        outcome="${{ steps.pester.outcome }}" ;;
              uninstaller)   outcome="${{ steps.uninstaller.outcome }}" ;;
            esac
            echo "$(gh_to_emoji "$outcome") $label : $outcome"
            [ "$outcome" = "failure" ] && any_failed=true
          done <<'STEPS'
            core-bins:Core binaries
            scope-bins:Scope binaries
            nx-doctor:nx doctor
            managed-block:Managed block
            idempotency:Idempotency
            provenance:Install provenance
            tarball-prov:Tarball provenance
            bats:Bats unit tests
            pester:Pester unit tests
            uninstaller:Uninstaller
          STEPS

          echo ""
          if [ "$any_failed" = "true" ]; then
            echo "❌ Some verification steps failed"
            exit 1
          else
            echo "✅ All verification steps passed"
          fi
