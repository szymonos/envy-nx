name: docs-to-gh-pages
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  gh_deploy:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: "true"
          cache-dependency-glob: "uv.lock"
          cache-suffix: "extra-docs"

      - name: Deploy docs to GitHub Pages
        run:
          uv run --extra docs mkdocs gh-deploy --force
