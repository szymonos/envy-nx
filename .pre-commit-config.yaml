repos:
  - repo: local
    hooks:
      - id: gremlins-check
        name: Detect gremlins / unwanted Unicode characters
        entry: python3 -m tests.hooks.gremlins
        language: system
        types: [text]
      - id: validate-docs-words
        name: validate docs words
        entry: python3 -m tests.hooks.validate_docs_words
        language: system
        pass_filenames: false
        files: \.md$
      - id: align-tables
        name: align markdown tables
        entry: python3 -m tests.hooks.align_tables
        language: system
        files: \.md$
        exclude: /copilot-instructions\.md
      - id: validate-scopes
        name: Validate scope definitions consistency
        entry: python3 -m tests.hooks.validate_scopes
        language: system
        files: (\.assets/lib/scopes\.json|nix/scopes/.*\.nix)
        pass_filenames: false
      - id: check-bash32
        name: Check nix-path scripts for bash 3.2 / BSD compatibility
        entry: python3 -m tests.hooks.check_bash32
        language: system
        files: (nix/.*\.sh$|\.assets/lib/(scopes|profile_block|nx_doctor|helpers)\.sh$|\.assets/config/shell_cfg/(aliases_nix|aliases_git|aliases_kubectl|functions)\.sh$|\.assets/setup/setup_common\.sh$|\.assets/provision/install_copilot\.sh$)
        types: [file]
      - id: check-zsh-compat
        name: Check shell-sourced scripts for zsh compatibility
        entry: python3 -m tests.hooks.check_zsh_compat
        language: system
        files: (\.assets/config/shell_cfg/.*\.sh$|\.assets/lib/(nx|nx_pkg|nx_scope|nx_profile|nx_lifecycle|profile_block)\.sh$)
        types: [file]
      - id: check-no-tty-read
        name: Forbid `read ... </dev/tty` without `# tty-ok` marker
        entry: python3 -m tests.hooks.check_no_tty_read
        language: system
        files: ^(\.assets/|nix/|wsl/|modules/).*\.(sh|zsh|bash)$
      - id: check-nx-completions
        name: Check nx completers and help text match nx_surface.json
        entry: python3 -m tests.hooks.check_nx_completions
        language: system
        pass_filenames: false
        files: (\.assets/lib/nx_surface\.json|\.assets/lib/nx_lifecycle\.sh|\.assets/config/shell_cfg/completions\.(bash|zsh)|\.assets/config/pwsh_cfg/_aliases_nix\.ps1|tests/hooks/(gen|check)_nx_completions\.py)
      - id: check-nx-profile-parity
        name: Check nx profile dispatcher parity (bash vs PowerShell)
        entry: python3 -m tests.hooks.check_nx_profile_parity
        language: system
        pass_filenames: false
        files: (\.assets/lib/nx_surface\.json|\.assets/config/pwsh_cfg/_aliases_nix\.ps1|tests/hooks/check_nx_profile_parity\.py)
      - id: check-nx-dispatch-parity
        name: Check nx_main dispatcher parity (bash vs nx_surface.json)
        entry: python3 -m tests.hooks.check_nx_dispatch_parity
        language: system
        pass_filenames: false
        files: (\.assets/lib/nx_surface\.json|\.assets/lib/nx\.sh|tests/hooks/check_nx_dispatch_parity\.py)
      - id: check-nx-lib-files-parity
        name: Check nx lib-file list parity across sync/self-sync/doctor
        entry: python3 -m tests.hooks.check_nx_lib_files_parity
        language: system
        pass_filenames: false
        files: (nix/lib/phases/bootstrap\.sh|\.assets/lib/nx_lifecycle\.sh|\.assets/lib/nx_doctor\.sh|tests/hooks/check_nx_lib_files_parity\.py)
      - id: bats-tests
        name: Run bats unit tests
        entry: python3 -m tests.hooks.run_bats
        language: system
        types: [file]
        pass_filenames: true
      - id: pester-tests
        name: Run Pester unit tests
        entry: python3 -m tests.hooks.run_pester
        language: system
        types: [file]
        pass_filenames: true
      - id: check-changelog
        name: Check CHANGELOG updated for runtime changes
        entry: python3 -m tests.hooks.check_changelog
        language: system
        pass_filenames: true
        files: (CHANGELOG\.md|nix/|\.assets/lib/|\.assets/config/|\.assets/setup/|\.assets/provision/|wsl/)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude: \.md$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        types_or: [python, pyi]
        args: [--fix]
        files: ^tests/
      - id: ruff-format
        types_or: [python, pyi]
        files: ^tests/
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        files: \.md$
        exclude: /copilot-instructions\.md
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.0
    hooks:
      - id: cspell
        files: \.md$
      - id: cspell
        name: check commit message spelling
        args:
          - --no-must-find-files
          - --no-progress
          - --no-summary
        stages: [commit-msg]
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        exclude: \.zsh$
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning", "--exclude=SC1090,SC2139,SC2148,SC2155,SC2174"]
        exclude: \.zsh$
